# ==================================================
# APPLICATION
# ==================================================
spring.application.name=user-service
spring.config.import=optional:configserver:http://localhost:8099

server.port=8110

# ==================================================
# DATABASE
# ==================================================
spring.datasource.url=jdbc:mysql://localhost:3306/campconnect_user_service?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==================================================
# JPA / HIBERNATE
# ==================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ==================================================
# MAIL
# ==================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=samaalichayyma@gmail.com
spring.mail.password=vcws svnf njqo uqzw

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.debug=false

# ==================================================
# EUREKA
# ==================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ==================================================
# LOGGING
# ==================================================
logging.level.com.campconnect.userservice.feign=DEBUG
logging.level.org.springframework.mail=DEBUG

# ==================================================
# RABBITMQ
# ==================================================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=/

spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=1000ms
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.multiplier=2.0

# ==================================================
# KAFKA
# ==================================================
spring.kafka.bootstrap-servers=${KAFKA_HOST:localhost}:9092

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.retries=3

spring.kafka.consumer.group-id=user-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*

# ==================================================
# ACTUATOR
# ==================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always